<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>🗩 ChatSocket</title>
    <meta name="description" content="some simple chat client idk">
    <link rel="author" href="Lukiiy">
</head>
<body>
    <main>
        <div class="wrapper" role="application">
            <div id="msgBoard" aria-live="polite"></div>

            <div class="composer">
                <input id="message" type="text" placeholder="Message" autocomplete="off" />

                <button id="sendBtn" aria-label="Send" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <dialog id="connectMenu">
        <form method="dialog" id="connectForm">
            <h3>Connect</h3>

            <div>
                <label for="server">WebSocket server</label>
                <input id="server" name="server" type="text" pattern="^(?:\w+://)?(?:[A-Za-z0-9_\x2d]{3,24}@)?[A-Za-z0-9.\x2d]+(?::\d+)?$" placeholder="ws://password@host:port" required />
            </div>

            <div>
                <label for="name">Username</label>
                <input id="name" name="name" type="text" minlength="3" maxlength="24" required />
                <small>Names are case-insensitive and must be unique.</small>
            </div>

            <section>
                <button type="submit" class="btn primary">Connect</button>
            </section>
        </form>
    </dialog>

    <script src="app.js" defer></script>
</body>
</html>
